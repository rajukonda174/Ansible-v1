- name: setup notification module
  hosts: all
  become: yes
  tasks:
    - name: Create appuser
      ansible.builtin.user:
        name: appuser
        system: yes
        shell: /bin/false
        create_home: no

    - name: remove /app
      ansible.builtin.file:
        path: /app
        state: absent

    - name: create /app folder
      ansible.builtin.file:
        path: /app
        state: directory

    - name: copy notification service
      ansible.builtin.copy:
        src: notification.service
        dest: /etc/systemd/system/notification.service


    - name: Install python
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
        state: present

    - name: download notification content
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/notification.zip
        dest: /app
        remote_src: yes

    - name: pip installation
      ansible.builtin.shell: pip3 install -r requirements.txt
      args:
        chdir: /app

    - name: Change file ownership, group and permissions
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: yes
        mode: 'o-rwx'

    - name: notification start
      ansible.builtin.systemd_service:
        name: notification
        state: started
        enabled: yes
        daemon_reload: yes


