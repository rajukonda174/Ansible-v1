
    - name:
      ansible.builtin.copy:
        src: rabbitmq.repo
        dest: /etc/yum.repos.d/rabbitmq.repo

    - name: Install rabbitmq-server&erlang
      ansible.builtin.dnf:
        name:
          - rabbitmq-server
          - erlang
        state: present

    - name: Start RabbitMQ service
      ansible.builtin.systemd_service:
        name: rabbitmq-server
        state: restarted

    - name: creating rabbitmq user
      community.rabbitmq.rabbitmq_user:
        user: roboshop
        password: RoboShop@1
        tags: administrator
        vhost: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
        state: present


