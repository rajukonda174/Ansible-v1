
    - name: Create appuser
      ansible.builtin.user:
        name: appuser
        system: yes
        shell: /bin/false
        create_home: no

    - name: remove /app
      ansible.builtin.file:
        path: /app
        state: absent

    - name: create /app folder
      ansible.builtin.file:
        path: /app
        state: directory


    - name: copy ratings service
      ansible.builtin.copy:
        src: ratings.service
        dest: /etc/systemd/system/ratings.service

    - name: Install python
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
          - mysql8.4
        state: present

    - name: download ratings content
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/ratings.zip
        dest: /app
        remote_src: yes

    - name: Load Schema
      ansible.builtin.shell: mysql -h 10.0.0.11 -u root -pRoboShop@1 < db/schema.sql
      args:
        chdir: /app

    - name: Load App User
      ansible.builtin.shell: mysql -h 10.0.0.11 -u root -pRoboShop@1 < db/app-user.sql
      args:
        chdir: /app

    - name: pip installation
      ansible.builtin.shell: pip3 install -r requirements.txt cryptography
      args:
        chdir: /app

    - name: Change file ownership, group and permissions
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: yes
        mode: 'o-rwx'

    - name: ratings start
      ansible.builtin.systemd_service:
        name: ratings
        state: started
        enabled: yes
        daemon_reload: yes
