
    - name: Create appuser
      ansible.builtin.user:
        name: appuser
        system: yes
        shell: /bin/false
        create_home: no

    - name: remove /app
      ansible.builtin.file:
        path: /app
        state: absent

    - name: create /app folder
      ansible.builtin.file:
        path: /app
        state: directory

    - name: copy order service
      ansible.builtin.copy:
        src: orders.service
        dest: /etc/systemd/system/orders.service

    - name: Install python
      ansible.builtin.dnf:
        name:
          - java-21-openjdk
          - java-21-openjdk-devel
          - maven
        state: present

    - name: download order content
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/orders.zip
        dest: /app
        remote_src: yes

    - name: build Application code
      ansible.builtin.shell: mvn clean package -DskipTests
      args:
        chdir: /app

    - name: Copy Jar file
      ansible.builtin.shell: cp target/orders.jar /app/orders.jar
      args:
        chdir: /app

    - name: Change file ownership, group and permissions
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: yes
        mode: 'o-rwx'

    - name: start orders
      ansible.builtin.systemd_service:
        name: orders
        state: started
        enabled: yes
        daemon_reload: yes

